spring.application.name=tcc

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration


# OpenAPI/Swagger Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# Custom OpenAPI URLs
tcc.openapi.dev-url=http://localhost:8080
#tcc.openapi.prod-url=https://sua-url-de-producao.com

# Server Configuration
server.port=8080

# Actuator: expõe apenas o endpoint de health
management.endpoints.web.exposure.include=health
# DEV: mostra detalhes dos componentes. Trocar para when-authorized
# quando o Spring Security for adicionado.
management.endpoint.health.show-details=always
